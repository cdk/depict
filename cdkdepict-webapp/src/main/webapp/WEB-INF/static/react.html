<!DOCTYPE html>
<html>
<head>
  <title>CDK React</title>
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <link rel="stylesheet" type="text/css" href="css/depict.css">
  <link rel="stylesheet" type="text/css" href="css/Glyphter.css">
  <link rel="stylesheet" type="text/css" href="webjars/font-awesome/css/all.css">
  <script src="webjars/jquery/jquery.min.js" type="text/javascript"></script>
  <script src="js/react.js" type="text/javascript"></script>
</head>
<body>
<div class="center" style="background: none; margin-top: 0; margin-bottom: -80px; text-align: left; font-size: 40pt; font-weight: bold; color: #fff;">
  <img src="img/depict-logo-cutout-white.svg" height="80px"/>
</div>
<div class="center">
  <div class="header">
    Apply a reaction <a href="https://en.wikipedia.org/wiki/SMIRKS">SMIRKS</a> transformation to one input molecule and depict all generated reactions.
    <div style="margin-top: 10px;">
      <a href="depict.html">Depict</a> |
      <a href="react.html">React</a> |
      <a href="map.html">Map</a>
    </div>
    <a style="position: absolute; right: 0; top: 0;"
       href="https://github.com/cdk/depict"><img decoding="async" width="149" height="149" src="https://github.blog/wp-content/uploads/2008/12/forkme_right_darkblue_121621.png?resize=149%2C149" class="attachment-full size-full" alt="Fork me on GitHub" loading="lazy" data-recalc-dims="1"></a>
  </div>

  <textarea id="react_input" onkeyup="updateReact()" autofocus>CCO
CCN</textarea>
  <input id="react_smirks"
         onkeyup="updateReact()"
         type="text"
         style="width: 100%; margin-top: 8px;"
         value="[C:1]-[O:2]>>[C:1]-[N:2]"
         placeholder="Enter reaction SMIRKS...">

  <div id="depict_main_opts">
    <i title="Clear input"
       onclick="clearReactInput();"
       class="fas fa-trash-alt icon"></i>
    <select name="style" onchange="updateReact()">
      <option value="cow">Color on White</option>
      <option value="cob">Color on Black</option>
      <option value="cot" selected>Color on Clear</option>
      <option value="bow">Black on White</option>
      <option value="bot">Black on Clear</option>
      <option value="wob">White on Black</option>
      <option value="nob">Neon on Black</option>
      <option value="not">Neon on Clear</option>
      <option value="wcot">White Color on Clear</option>
    </select>
    <select name="annotate" onchange="updateReact()">
      <option value="none" selected>No Annotation</option>
      <option value="number">Atom Numbers</option>
      <option value="mapidx">Atom Mapping</option>
      <option value="colmap">Color Map</option>
      <option value="rxnchg">Reaction Changes</option>
      <option value="atomvalue">Atom Value</option>
      <option value="cip">CIP Stereo Label</option>
    </select>
    <select id="hdisp" name="hdisp" onchange="updateReact()">
      <option value="M">Minimal Hydrogens</option>
      <option value="P">Input Hydrogens</option>
      <option value="S" selected>Smart Hydrogens</option>
      <option value="C">Chiral Hydrogens</option>
      <option value="X">Explicit Hydrogens</option>
    </select>
    <select name="abbr" onchange="updateReact()">
      <option value="on" selected>Abbreviate Reagents and Groups</option>
      <option value="reagents">Abbreviate Reagents</option>
      <option value="groups">Abbreviate Groups</option>
      <option value="off">Do Not Abbreviate</option>
    </select>
    <input id="sma" onkeyup="updateReact()" name="smarts"
           type="text" placeholder="Enter SMARTS pattern...">
    <i id="more-opts"
       title="More Options"
       onclick="toggleReactExtraOpts();"
       class="fas fa-ellipsis-h icon"></i>
  </div>

  <div id="depict_extra_opts">
    <table class="grid" style="text-align: left;">
      <tr>
        <th title="Change the default reaction arrow type">Reaction</th>
        <td>
          <select name="arw" onchange="updateReact()">
            <option value="" selected>Plain</option>
            <option value="EQU">Equilibrium</option>
            <option value="NGO">No Go</option>
            <option value="RET">Retro Synthetic</option>
            <option value="RES">Resonance</option>
          </select>
        </td>
        <th title="Change if dative bonds are automatically perceived or not">Dative Bonds</th>
        <td>
          <select name="dat" onchange="updateReact()">
            <option value="y">Always</option>
            <option value="m" selected>Metal Only</option>
            <option value="n">Never</option>
          </select>
        </td>
        <th title="Reverse reactants and products in the SMIRKS transform">Reverse Rule</th>
        <td>
          <input type="checkbox" name="reverse" onchange="updateReact()">
        </td>
      </tr>
      <tr>
        <th title="Render the title inside the sketch rather than HTML">Embed Title</th>
        <td>
          <input type="checkbox" name="showtitle" onchange="updateReact()">
        </td>
        <th title="Change the overall size of the depictions">Zoom</th>
        <td>
          <input onchange="updateReact()" name="zoom" type="range" min="10" max="500"
                 step="5" value="130">
        </td>
        <th>Rotate</th>
        <td>
          <input onchange="updateReact()" name="rotate" type="range" min="0" max="360"
                 step="1" value="0">
        </td>
      </tr>
      <tr>
        <th>Flip</th>
        <td>
          <input type="checkbox" name="flip" onchange="updateReact()">
        </td>
      </tr>
    </table>
  </div>

  <div id="result">
  </div>
  <div class="footer">
    Built with the <a href="https://www.github.com/cdk/cdk">Chemistry Development Kit</a>. Depict v${depict.version}, CDK v${cdk.version}.
  </div>
</div>
<script type="text/javascript">
    window.onload = updateReact();
</script>
</body>
</html>
